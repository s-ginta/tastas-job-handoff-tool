<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タスタス求人共有ツール</title>
  <style>
    :root {
      --main: #1f8f8b;
      --main-dark: #166f6c;
      --bg: #f5f8fa;
      --card: #ffffff;
      --text: #1f2933;
      --sub: #667085;
      --line: #d9e2ec;
      --accent: #e8f7f6;
      --danger: #d64545;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
        "Yu Gothic", "YuGothic", "Meiryo", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    header {
      background: linear-gradient(135deg, var(--main), #3bb7b2);
      color: #fff;
      padding: 28px 18px;
      text-align: center;
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    header p {
      margin: 0;
      font-size: 14px;
      opacity: 0.95;
    }

    main {
      width: min(1100px, 100%);
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .section {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(31, 41, 51, 0.06);
      margin-bottom: 16px;
    }

    .section h2 {
      margin: 0 0 14px;
      font-size: 18px;
      border-left: 5px solid var(--main);
      padding-left: 10px;
    }

    .field {
      margin-bottom: 16px;
    }

    label.title {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="date"],
    input[type="time"],
    input[type="number"],
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      background: #fff;
      color: var(--text);
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .choices {
      display: grid;
      gap: 8px;
    }

    .choice {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
    }

    .choice input {
      margin-top: 6px;
    }

    .choice:hover {
      background: var(--accent);
      border-color: var(--main);
    }

    .sub-box {
      margin-top: 12px;
      padding: 14px;
      background: #f8fbfc;
      border: 1px dashed var(--line);
      border-radius: 12px;
    }

    .sub-title {
      font-weight: 700;
      margin: 10px 0 8px;
      color: var(--main-dark);
    }

    .hidden {
      display: none;
    }

    .output-area {
      position: sticky;
      top: 16px;
      align-self: start;
    }

    #output {
      width: 100%;
      min-height: 520px;
      white-space: pre-wrap;
      background: #0f172a;
      color: #f8fafc;
      border: none;
      border-radius: 14px;
      padding: 18px;
      font-size: 14px;
      line-height: 1.8;
    }

    .button-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .copy-btn {
      background: var(--main);
      color: #fff;
      flex: 1;
    }

    .copy-btn:hover {
      background: var(--main-dark);
    }

    .clear-btn {
      background: #e5e7eb;
      color: #111827;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      color: var(--main-dark);
      font-weight: 700;
      min-height: 20px;
    }

    .note {
      color: var(--sub);
      font-size: 13px;
      margin-top: 4px;
    }

    .required {
      color: var(--danger);
      font-size: 13px;
      margin-left: 4px;
    }

    @media (max-width: 860px) {
      main {
        grid-template-columns: 1fr;
        padding: 14px;
      }

      .output-area {
        position: static;
      }

      #output {
        min-height: 360px;
      }

      header h1 {
        font-size: 21px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>タスタス求人共有ツール</h1>
    <p>営業確認内容を入力すると、システム説明担当への共有文を自動生成できます。</p>
  </header>

  <main>
    <form id="form">
      <section class="section">
        <h2>1. 基本情報</h2>

        <div class="field">
          <label class="title" for="facility">施設名<span class="required">任意</span></label>
          <input type="text" id="facility" placeholder="例）〇〇介護老人保健施設" />
        </div>

        <div class="field">
          <label class="title" for="sales">営業担当名<span class="required">任意</span></label>
          <input type="text" id="sales" placeholder="例）鈴木" />
        </div>

        <div class="field">
          <label class="title" for="systemDate">システム説明日<span class="required">任意</span></label>
          <input type="date" id="systemDate" />
        </div>

        <div class="field">
          <label class="title" for="systemTime">システム説明時間<span class="required">任意</span></label>
          <input type="time" id="systemTime" />
        </div>
      </section>

      <section class="section">
        <h2>2. 求人公開時期</h2>

        <div class="choices">
          <label class="choice">
            <input type="radio" name="publishTiming" value="すぐに求人を公開したい" />
            <span>すぐに求人を公開したい</span>
          </label>

          <label class="choice">
            <input type="radio" name="publishTiming" value="1〜2週間先から求人を公開したい" />
            <span>1〜2週間先から求人を公開したい</span>
          </label>

          <label class="choice">
            <input type="radio" name="publishTiming" value="来月以降に求人を公開したい" />
            <span>来月以降に求人を公開したい</span>
          </label>

          <label class="choice">
            <input type="radio" name="publishTiming" value="公開予定はないが、登録・システム説明のみ" />
            <span>公開予定はないが、登録・システム説明のみ</span>
          </label>
        </div>
      </section>

      <section class="section" id="scheduleStatusSection">
        <h2>3. 日程状況</h2>

        <div class="choices">
          <label class="choice">
            <input type="radio" name="scheduleStatus" value="日程確定済" />
            <span>日程確定済</span>
          </label>

          <label class="choice">
            <input type="radio" name="scheduleStatus" value="日程未確定" />
            <span>日程未確定</span>
          </label>
        </div>

        <p class="note">※公開予定なしの場合は任意です。</p>
      </section>

      <section class="section hidden" id="confirmedSection">
        <h2>4. 日程確定済の場合</h2>

        <div class="field">
          <label class="title" for="confirmedSlots">月内の募集枠数</label>
          <input type="number" id="confirmedSlots" min="0" placeholder="例）20" />
        </div>

        <div class="field">
          <label class="title" for="confirmedNote">補足</label>
          <textarea id="confirmedNote" placeholder="例）7月中に日勤中心で20枠程度。詳細日程はシステム説明時に確認予定。"></textarea>
        </div>
      </section>

      <section class="section hidden" id="unconfirmedSection">
        <h2>4. 日程未確定の場合</h2>

        <div class="field">
          <label class="title">未確定理由</label>

          <div class="choices">
            <label class="choice">
              <input type="checkbox" name="reason" value="シフト未確定" />
              <span>シフト未確定</span>
            </label>

            <label class="choice">
              <input type="checkbox" name="reason" value="欠員日が未確定" />
              <span>欠員日が未確定</span>
            </label>

            <label class="choice">
              <input type="checkbox" name="reason" value="募集人数が未確定" />
              <span>募集人数が未確定</span>
            </label>

            <label class="choice">
              <input type="checkbox" name="reason" value="勤務時間が未確定" />
              <span>勤務時間が未確定</span>
            </label>

            <label class="choice">
              <input type="checkbox" name="reason" value="施設側で確認中" />
              <span>施設側で確認中</span>
            </label>

            <label class="choice">
              <input type="checkbox" name="reason" value="その他" />
              <span>その他</span>
            </label>
          </div>
        </div>

        <div class="field">
          <label class="title" for="unconfirmedSlots">想定する月内の募集枠数</label>
          <input type="number" id="unconfirmedSlots" min="0" placeholder="例）10" />
        </div>

        <div class="field">
          <label class="title" for="unconfirmedNote">補足</label>
          <textarea id="unconfirmedNote" placeholder="例）シフト確定後に日程調整予定。午前帯で募集する可能性あり。"></textarea>
        </div>
      </section>

      <section class="section">
        <h2>5. 募集職種</h2>

        <div class="choices">
          <label class="choice">
            <input type="radio" name="jobType" value="看護師" />
            <span>看護師</span>
          </label>

          <label class="choice">
            <input type="radio" name="jobType" value="介護士" />
            <span>介護士</span>
          </label>

          <label class="choice">
            <input type="radio" name="jobType" value="看護師・介護士どちらも" />
            <span>看護師・介護士どちらも</span>
          </label>
        </div>
      </section>

      <section class="section">
        <h2>6. 求人内容</h2>

        <div class="field">
          <label class="title">求人種別</label>
          <div class="choices">
            <label class="choice">
              <input type="radio" name="jobCategory" value="単発求人" />
              <span>単発求人</span>
            </label>

            <label class="choice">
              <input type="radio" name="jobCategory" value="初回お試し求人" />
              <span>初回お試し求人</span>
            </label>

            <label class="choice">
              <input type="radio" name="jobCategory" value="説明会求人" />
              <span>説明会求人</span>
            </label>
          </div>
        </div>

        <div id="spotJobDetails" class="sub-box hidden">
          <div class="sub-title">単発求人の詳細</div>
          <div class="choices">
            <label class="choice">
              <input type="checkbox" name="jobDetail" value="スポット" />
              <span>スポット</span>
            </label>

            <label class="choice">
              <input type="checkbox" name="jobDetail" value="午前" />
              <span>午前</span>
            </label>

            <label class="choice">
              <input type="checkbox" name="jobDetail" value="午後" />
              <span>午後</span>
            </label>

            <label class="choice">
              <input type="checkbox" name="jobDetail" value="日勤" />
              <span>日勤</span>
            </label>

            <label class="choice">
              <input type="checkbox" name="jobDetail" value="夜勤" />
              <span>夜勤</span>
            </label>
          </div>
        </div>

        <div id="trialJobDetails" class="sub-box hidden">
          <div class="sub-title">初回お試し求人の詳細</div>
          <div class="choices">
            <label class="choice">
              <input type="checkbox" name="jobDetail" value="まずは1回勤務してもらいたい" />
              <span>まずは1回勤務してもらいたい</span>
            </label>

            <label class="choice">
              <input type="checkbox" name="jobDetail" value="勤務後に施設・ワーカー双方で継続可否を判断したい" />
              <span>勤務後に施設・ワーカー双方で継続可否を判断したい</span>
            </label>

            <label class="choice">
              <input type="checkbox" name="jobDetail" value="良い方がいれば次回以降の勤務相談につなげたい" />
              <span>良い方がいれば次回以降の勤務相談につなげたい</span>
            </label>
          </div>
        </div>

        <div id="briefingJobDetails" class="sub-box hidden">
          <div class="sub-title">説明会求人の詳細</div>
          <div class="choices">
            <label class="choice">
              <input type="checkbox" name="jobDetail" value="勤務前に説明会・面談・顔合わせを行いたい" />
              <span>勤務前に説明会・面談・顔合わせを行いたい</span>
            </label>

            <label class="choice">
              <input type="checkbox" name="jobDetail" value="継続勤務できる人材を探したい" />
              <span>継続勤務できる人材を探したい</span>
            </label>

            <label class="choice">
              <input type="checkbox" name="jobDetail" value="採用・長期稼働前提で進めたい" />
              <span>採用・長期稼働前提で進めたい</span>
            </label>
          </div>
        </div>
      </section>

      <section class="section">
        <h2>7. 補足入力</h2>

        <div class="field">
          <label class="title" for="jobNote">求人内容の補足</label>
          <textarea id="jobNote" placeholder="例）まずは午前の単発求人で反応を見たい。"></textarea>
        </div>

        <div class="field">
          <label class="title" for="handoffNote">営業からシステム説明担当への申し送り</label>
          <textarea id="handoffNote" placeholder="例）システム説明時に求人登録まで進められる可能性があります。"></textarea>
        </div>
      </section>
    </form>

    <aside class="output-area">
      <section class="section">
        <h2>共有文</h2>
        <textarea id="output" readonly></textarea>

        <div class="button-row">
          <button type="button" class="copy-btn" id="copyBtn">共有文をコピー</button>
          <button type="button" class="clear-btn" id="clearBtn">入力をクリア</button>
        </div>

        <div class="status" id="status"></div>
      </section>
    </aside>
  </main>

  <script>
    const form = document.getElementById("form");
    const output = document.getElementById("output");
    const copyBtn = document.getElementById("copyBtn");
    const clearBtn = document.getElementById("clearBtn");
    const status = document.getElementById("status");

    const confirmedSection = document.getElementById("confirmedSection");
    const unconfirmedSection = document.getElementById("unconfirmedSection");
    const scheduleStatusSection = document.getElementById("scheduleStatusSection");

    const spotJobDetails = document.getElementById("spotJobDetails");
    const trialJobDetails = document.getElementById("trialJobDetails");
    const briefingJobDetails = document.getElementById("briefingJobDetails");

    function getRadioValue(name) {
      const checked = document.querySelector(`input[name="${name}"]:checked`);
      return checked ? checked.value : "";
    }

    function getCheckboxValues(name) {
      return Array.from(document.querySelectorAll(`input[name="${name}"]:checked`))
        .map((item) => item.value);
    }

    function formatDate(dateValue) {
      if (!dateValue) return "";
      const date = new Date(dateValue + "T00:00:00");
      const month = date.getMonth() + 1;
      const day = date.getDate();
      return `${month}月${day}日`;
    }

    function updateDisplay() {
      const publishTiming = getRadioValue("publishTiming");
      const scheduleStatus = getRadioValue("scheduleStatus");
      const jobCategory = getRadioValue("jobCategory");

      const noPublish = publishTiming === "公開予定はないが、登録・システム説明のみ";

      if (noPublish) {
        scheduleStatusSection.style.opacity = "0.45";
      } else {
        scheduleStatusSection.style.opacity = "1";
      }

      confirmedSection.classList.toggle("hidden", scheduleStatus !== "日程確定済");
      unconfirmedSection.classList.toggle("hidden", scheduleStatus !== "日程未確定");

      spotJobDetails.classList.toggle("hidden", jobCategory !== "単発求人");
      trialJobDetails.classList.toggle("hidden", jobCategory !== "初回お試し求人");
      briefingJobDetails.classList.toggle("hidden", jobCategory !== "説明会求人");
    }

    function generateText() {
      const facility = document.getElementById("facility").value.trim();
      const sales = document.getElementById("sales").value.trim();
      const systemDate = formatDate(document.getElementById("systemDate").value);
      const systemTime = document.getElementById("systemTime").value;
      const systemDateTime = [systemDate, systemTime].filter(Boolean).join(" ");

      const publishTiming = getRadioValue("publishTiming");
      const scheduleStatus = getRadioValue("scheduleStatus");
      const jobType = getRadioValue("jobType");

      const confirmedSlots = document.getElementById("confirmedSlots").value.trim();
      const confirmedNote = document.getElementById("confirmedNote").value.trim();

      const unconfirmedSlots = document.getElementById("unconfirmedSlots").value.trim();
      const unconfirmedNote = document.getElementById("unconfirmedNote").value.trim();

      const reasons = getCheckboxValues("reason");

      const jobCategory = getRadioValue("jobCategory");
      const jobDetails = getCheckboxValues("jobDetail");

      const jobNote = document.getElementById("jobNote").value.trim();
      const handoffNote = document.getElementById("handoffNote").value.trim();

      let slotsText = "";
      let scheduleExtra = "";
      let noteText = "";

      if (scheduleStatus === "日程確定済") {
        slotsText = confirmedSlots ? `${confirmedSlots}枠` : "";
        noteText = confirmedNote;
      }

      if (scheduleStatus === "日程未確定") {
        slotsText = unconfirmedSlots ? `${unconfirmedSlots}枠想定` : "";
        scheduleExtra = reasons.length ? `未確定理由：${reasons.join("、")}` : "";
        noteText = unconfirmedNote;
      }

      const jobContentText = jobCategory
        ? `求人種別：${jobCategory}\n詳細：\n${jobDetails.length ? jobDetails.map((item) => `・${item}`).join("\n") : ""}`
        : "";

      const finalNote = [scheduleExtra, noteText, jobNote]
        .filter(Boolean)
        .join("\n");

      const autoHandoff = createAutoHandoff({
        publishTiming,
        scheduleStatus,
        slotsText,
        jobCategory,
        jobDetails,
        handoffNote
      });

      const text = `【求人共有】

施設名：${facility}
営業担当：${sales}
システム説明日時：${systemDateTime}

求人公開時期：${publishTiming}
日程状況：${scheduleStatus}
募集職種：${jobType}
月内募集枠数：${slotsText}

求人内容：
${jobContentText}

補足：
${finalNote}

【申し送り】

システム説明時に確認・対応してほしい内容：
${autoHandoff}`;

      output.value = text;
    }

    function createAutoHandoff(data) {
      const { publishTiming, scheduleStatus, slotsText, jobCategory, handoffNote } = data;

      if (handoffNote) {
        return handoffNote;
      }

      if (publishTiming === "公開予定はないが、登録・システム説明のみ") {
        return "今回は求人公開予定はないため、登録・操作説明を中心にお願いします。今後求人を出す可能性があるかも確認してください。";
      }

      if (scheduleStatus === "日程確定済") {
        return `求人登録まで進められる可能性があります。月内募集枠数${slotsText ? "（" + slotsText + "）" : ""}、勤務時間帯、詳細日程を確認しながら、求人作成までサポートをお願いします。`;
      }

      if (scheduleStatus === "日程未確定") {
        return "日程は未確定のため、システム説明時に不足している情報を確認してください。想定枠数、勤務時間帯、公開開始時期を整理したうえで、求人作成の準備まで進めてください。";
      }

      if (jobCategory === "説明会求人") {
        return "説明会求人として進める可能性があります。勤務前の説明会・面談・顔合わせの流れを確認してください。";
      }

      if (jobCategory === "初回お試し求人") {
        return "初回お試し求人として進める可能性があります。1回勤務後の継続可否の確認方法や、次回以降の勤務相談の流れを確認してください。";
      }

      return "システム説明時に求人公開の意向、日程状況、募集枠数、勤務時間帯を確認してください。";
    }

    document.querySelectorAll('input[name="jobCategory"]').forEach((radio) => {
      radio.addEventListener("change", () => {
        document.querySelectorAll('input[name="jobDetail"]').forEach((checkbox) => {
          checkbox.checked = false;
        });

        updateDisplay();
        generateText();
      });
    });

    form.addEventListener("input", () => {
      updateDisplay();
      generateText();
      status.textContent = "";
    });

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(output.value);
        status.textContent = "コピーしました";
      } catch (error) {
        output.select();
        document.execCommand("copy");
        status.textContent = "コピーしました";
      }
    });

    clearBtn.addEventListener("click", () => {
      form.reset();
      updateDisplay();
      generateText();
      status.textContent = "入力をクリアしました";
    });

    updateDisplay();
    generateText();
  </script>
</body>
</html>
